{% extends "groups/group_base.html" %}
{% load django_bootstrap5 %}

{% block group_content %}
    <div class="container mt-5">
        <h1>Create Group</h1>
        <form action="{% url 'groups:group_create' %}" method="POST" id="group-create-form">
            {% csrf_token %}
            {% bootstrap_form form %}
            <input type="submit" class="btn btn-primary" value="Register Group">
        </form>
    </div>
{% endblock %}
