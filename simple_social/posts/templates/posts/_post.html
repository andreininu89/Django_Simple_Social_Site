<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h5 class="card-title">
            <a href="{% url 'posts:for_user' username=post.user.username %}" class="text-decoration-none">
                @{{ post.user.username }}
            </a>
        </h5>

        <h6 class="card-subtitle mb-2 text-muted">
            <time class="time">{{ post.created_at }}</time>
            {% if post.group %}
                in <a href="{% url 'groups:single' slug=post.group.slug %}" class="text-decoration-none">
                    {{ post.group.name }}
                </a>
            {% endif %}
        </h6>

        <div class="card-text">
            {{ post.message_html|safe }}
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">

            <a href="{% url 'posts:single' username=post.user.username pk=post.pk %}" class="btn btn-sm btn-outline-primary">
                 View Full Post
            </a>
            {% if not hide_delete %}
                {% if user.is_authenticated and post.user == user %}
                    <a href="{% url 'posts:delete' pk=post.pk %}" class="btn btn-sm btn-danger" title="delete">
                        Delete
                    </a>
                {% endif %}
            {% endif %}
        </div>
    </div>
</div>
