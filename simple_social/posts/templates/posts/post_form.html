{% extends "posts/post_base.html" %}
{% load django_bootstrap5 %}

{% block post_content %}
    <h4>Create a new Post</h4>
    <form method="POST" action="{% url 'posts:create' %}" id="postForm">
        {% csrf_token %}
        {% bootstrap_form form %}
        <input type="submit" class="btn btn-primary" value="Create">
    </form>
{% endblock %}
