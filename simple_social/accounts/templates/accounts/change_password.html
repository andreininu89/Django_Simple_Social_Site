{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
    <div class="container mt-5">
        <h1>Change Password</h1>
        <form method="POST">
            {% csrf_token %}
            {% bootstrap_form form %}
            <input type="submit" class="btn btn-primary" value="Update">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
